<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jeriel's - Commande</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Poppins,sans-serif;
    background:linear-gradient(to right,#dbe9f4,#fff);
    color:#222;
}

/* ================= HEADER ================= */

header{

    background-image:url('jeriels.webp');

    background-position:center center;
    background-size:cover;
    background-repeat:no-repeat;

    color:white;
    text-align:center;

    position:relative;

    min-height:420px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:30px 20px;

    overflow:hidden;

    animation:zoomBg 12s ease-in-out infinite alternate;
}

@keyframes zoomBg{

    from{
        background-size:100%;
    }

    to{
        background-size:110%;
    }

}

header::after{

    content:"";

    position:absolute;

    top:0;
    left:0;
    right:0;
    bottom:0;

    background:
    linear-gradient(
        to bottom,
        rgba(0,0,0,0.45),
        rgba(0,0,0,0.60)
    );

}

header *{
    position:relative;
    z-index:2;
}

.logo{
    font-family:"Playfair Display",serif;
    font-size:52px;
    margin-bottom:10px;
    text-shadow:0 4px 10px rgba(0,0,0,0.4);
}

header p{
    font-size:22px;
    font-weight:500;
}

/* ================= MENU ================= */

.menu{
    max-width:850px;
    margin:auto;
    padding:20px;
}

/* Catégories */

.category-title{
    font-size:24px;
    color:#1d2b5b;
    margin:30px 0 15px;
    font-weight:700;
}

/* Item */

.menu-item{

    display:grid;
    grid-template-columns:1fr auto;

    gap:15px;

    align-items:center;

    background:white;

    padding:15px;

    border-radius:18px;

    margin-bottom:15px;

    box-shadow:0 5px 15px rgba(0,0,0,0.08);

    transition:0.25s;
}

.menu-item:hover{
    transform:translateY(-3px);
}

.menu-item.active{
    border:2px solid #c89b3c;
    background:#fff8e8;
}

.product-name{
    font-size:17px;
    font-weight:600;
}

.price{
    color:#c89b3c;
    font-weight:bold;
    margin-top:5px;
    display:block;
}

/* Boutons */

.add-btn{

    background:#c89b3c;

    color:white;

    border:none;

    padding:10px 18px;

    border-radius:12px;

    font-weight:bold;

    cursor:pointer;

    margin-bottom:10px;

    width:100%;
}

.qty-control{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.qty-btn{

    width:32px;
    height:32px;

    border:none;

    border-radius:50%;

    background:#1d2b5b;

    color:white;

    font-size:18px;

    cursor:pointer;
}

/* ================= PANIER ================= */

.cart-btn{

    position:fixed;

    bottom:20px;
    right:20px;

    background:#c89b3c;

    color:white;

    padding:15px 22px;

    border-radius:50px;

    font-weight:bold;

    font-size:18px;

    display:flex;
    align-items:center;
    gap:10px;

    cursor:pointer;

    box-shadow:0 8px 20px rgba(0,0,0,0.35);

    z-index:999;

    animation:pulse 1.5s infinite;

    backdrop-filter:blur(10px);
}

.cart-btn span{

    background:white;

    color:#c89b3c;

    border-radius:50%;

    padding:4px 9px;

    font-size:14px;

    font-weight:bold;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }

}

.cart-btn.bump{
    animation:bump 0.3s ease;
}

@keyframes bump{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.2);
    }

    100%{
        transform:scale(1);
    }

}

/* ================= PANIER PANEL ================= */

.cart-panel{

    position:fixed;

    bottom:0;
    left:0;
    right:0;

    background:white;

    border-radius:25px 25px 0 0;

    padding:20px;

    max-height:85%;

    overflow-y:auto;

    transform:translateY(100%);

    transition:0.3s;

    z-index:1000;
}

.cart-panel.open{
    transform:translateY(0);
}

.close-btn{

    width:100%;

    padding:12px;

    border:none;

    background:#999;

    color:white;

    border-radius:12px;

    margin-bottom:15px;

    cursor:pointer;
}

/* Résumé */

.summary{

    background:#f7f7f7;

    padding:15px;

    border-radius:15px;

    margin-top:15px;
}

.summary p,
.summary h2{

    display:flex;

    justify-content:space-between;

    margin-bottom:10px;
}

.summary h2{
    color:#1d2b5b;
}

/* Inputs */

input,
textarea,
select{

    width:100%;

    padding:12px;

    border-radius:12px;

    border:1px solid #ddd;

    margin-top:12px;

    font-family:Poppins;
}

textarea{
    resize:none;
}

/* WhatsApp */

.whatsapp-btn{

    width:100%;

    padding:15px;

    border:none;

    background:green;

    color:white;

    font-size:16px;

    font-weight:bold;

    border-radius:30px;

    margin-top:18px;

    cursor:pointer;
}

/* Toast */

.toast{

    position:fixed;

    bottom:100px;

    left:50%;

    transform:translateX(-50%);

    background:#1d2b5b;

    color:white;

    padding:12px 20px;

    border-radius:30px;

    opacity:0;

    transition:0.3s;

    z-index:2000;
}

.toast.show{
    opacity:1;
}

/* ================= MOBILE ================= */

@media (max-width:768px){

    header{

        min-height:520px;

        background-position:center top;

        background-size:cover;

        padding-top:80px;
        padding-bottom:80px;
    }

    .logo{
        font-size:48px;
    }

    header p{
        font-size:22px;
    }

    .menu-item{
        grid-template-columns:1fr;
    }

    .add-btn{
        width:100%;
    }

}

</style>
</head>

<body>

<header>

    <div class="logo"></div>

    <p></p>

</header>

<section class="menu" id="menu"></section>

<!-- Bouton panier -->

<div class="cart-btn" onclick="toggleCart()">

🛒 <span id="count">0</span>

</div>

<!-- Panier -->

<div class="cart-panel" id="cartPanel">

    <button class="close-btn" onclick="toggleCart()">
        Fermer
    </button>

    <h2>Votre commande</h2>

    <div id="cartItems"></div>

    <!-- Résumé -->

    <div class="summary">

        <p>
            <span>Sous-total</span>
            <span id="subtotal">0 FCFA</span>
        </p>

        <p>
            <span>Livraison</span>
            <span id="deliveryPrice">0 FCFA</span>
        </p>

        <h2>
            <span>Total</span>
            <span id="finalTotal">0 FCFA</span>
        </h2>

    </div>

    <!-- Livraison -->

    <select id="delivery" onchange="updateCart()">

        <option value="1000">
            🚚 Livraison (+1000 FCFA)
        </option>

        <option value="0">
            🏪 Retrait sur place
        </option>

    </select>

    <input type="text" id="name" placeholder="Votre nom">

    <input type="text" id="phone" placeholder="Votre numéro">

    <input type="text" id="address" placeholder="Adresse">

    <textarea id="note" placeholder="Note (optionnel)"></textarea>

    <button class="whatsapp-btn" onclick="sendWhatsApp()">
        Commander via WhatsApp
    </button>

</div>

<!-- Toast -->

<div class="toast" id="toast">
Produit ajouté au panier ✅
</div>

<script>

/* ================= CONFIG ================= */

const phoneNumber = "+2250142026540";

/* ================= PRODUITS ================= */

const products = [

{
    category:"🥞 Sucrées",

    items:[
        {name:"Crêpes nature",price:750},
        {name:"Crêpes chocolat",price:1000},
        {name:"Crêpes Nutella ⭐ Best-seller",price:2000},
        {name:"Crêpes Cérélac",price:1500}
    ]
},

{
    category:"🧀 Salées",

    items:[
        {name:"Crêpe salée jambon",price:1000},
        {name:"Crêpe salée viande",price:1000}
    ]
},

{
    category:"🍰 Desserts",

    items:[
        {name:"Cake",price:1000}
    ]
}

];

/* ================= VARIABLES ================= */

let flatProducts = [];
let cart = {};

/* ================= FORMAT ================= */

function formatPrice(price){

    return price.toLocaleString('fr-FR') + " FCFA";

}

/* ================= MENU ================= */

function renderMenu(){

    const menu = document.getElementById("menu");

    menu.innerHTML = "";

    flatProducts = [];

    let index = 0;

    products.forEach(category=>{

        menu.innerHTML += `
        <div class="category-title">
            ${category.category}
        </div>
        `;

        category.items.forEach(product=>{

            flatProducts.push(product);

            menu.innerHTML += `

            <div class="menu-item" id="item-${index}">

                <div>

                    <div class="product-name">
                        ${product.name}
                    </div>

                    <span class="price">
                        ${formatPrice(product.price)}
                    </span>

                </div>

                <div>

                    <button class="add-btn"
                    onclick="updateQty(${index},1)">
                    + Ajouter
                    </button>

                    <div class="qty-control">

                        <button class="qty-btn"
                        onclick="updateQty(${index},-1)">
                        -
                        </button>

                        <span id="qty-${index}">
                            0
                        </span>

                        <button class="qty-btn"
                        onclick="updateQty(${index},1)">
                        +
                        </button>

                    </div>

                </div>

            </div>

            `;

            index++;

        });

    });

}

/* ================= TOAST ================= */

function showToast(){

    const toast = document.getElementById("toast");

    toast.classList.add("show");

    setTimeout(()=>{

        toast.classList.remove("show");

    },1500);

}

/* ================= ANIMATION ================= */

function animateCart(){

    const btn = document.querySelector(".cart-btn");

    btn.classList.add("bump");

    setTimeout(()=>{

        btn.classList.remove("bump");

    },300);

}

/* ================= QUANTITÉ ================= */

function updateQty(i,change){

    cart[i] = (cart[i] || 0) + change;

    if(cart[i] < 0){
        cart[i] = 0;
    }

    document.getElementById("qty-"+i).innerText = cart[i];

    const item = document.getElementById("item-"+i);

    if(cart[i] > 0){

        item.classList.add("active");

    }else{

        item.classList.remove("active");

    }

    if(change > 0){
        showToast();
    }

    if(navigator.vibrate){
        navigator.vibrate(50);
    }

    animateCart();

    updateCart();

}

/* ================= PANIER ================= */

function updateCart(){

    let count = 0;

    let subtotal = 0;

    let html = "";

    Object.keys(cart).forEach(i=>{

        if(cart[i] > 0){

            let p = flatProducts[i];

            let sub = p.price * cart[i];

            subtotal += sub;

            count += cart[i];

            html += `
            <p>
            ${p.name} x${cart[i]}
            = ${formatPrice(sub)}
            </p>
            `;

        }

    });

    if(count === 0){

        html = "<p>Votre panier est vide</p>";

    }

    let delivery =
    parseInt(document.getElementById("delivery").value);

    let total = subtotal + delivery;

    document.getElementById("count").innerText = count;

    document.getElementById("cartItems").innerHTML = html;

    document.getElementById("subtotal").innerText =
    formatPrice(subtotal);

    document.getElementById("deliveryPrice").innerText =
    formatPrice(delivery);

    document.getElementById("finalTotal").innerText =
    formatPrice(total);

}

/* ================= TOGGLE ================= */

function toggleCart(){

    document.getElementById("cartPanel")
    .classList.toggle("open");

}

/* ================= WHATSAPP ================= */

function sendWhatsApp(){

    let name =
    document.getElementById("name").value.trim();

    let phone =
    document.getElementById("phone").value.trim();

    let address =
    document.getElementById("address").value.trim();

    let note =
    document.getElementById("note").value.trim();

    let deliveryType =
    document.getElementById("delivery")
    .selectedOptions[0].text;

    let deliveryPrice =
    parseInt(document.getElementById("delivery").value);

    let hasItems =
    Object.values(cart).some(q => q > 0);

    if(!hasItems){

        alert("Votre panier est vide");

        return;
    }

    if(!name || !phone || !address){

        alert("Veuillez remplir toutes les informations");

        return;
    }

    let msg =
    "🧾 *Nouvelle commande - Jeriel's*\n\n";

    let subtotal = 0;

    Object.keys(cart).forEach(i=>{

        if(cart[i] > 0){

            let p = flatProducts[i];

            let sub = p.price * cart[i];

            subtotal += sub;

            msg += `🥞 ${p.name}\n`;
            msg += `Quantité: ${cart[i]}\n`;
            msg += `Sous-total: ${formatPrice(sub)}\n\n`;

        }

    });

    let total = subtotal + deliveryPrice;

    msg += `🚚 Mode: ${deliveryType}\n`;
    msg += `💰 Sous-total: ${formatPrice(subtotal)}\n`;
    msg += `📦 Livraison: ${formatPrice(deliveryPrice)}\n`;
    msg += `🔥 Total final: ${formatPrice(total)}\n\n`;

    msg += `👤 Nom: ${name}\n`;
    msg += `📞 Téléphone: ${phone}\n`;
    msg += `📍 Adresse: ${address}\n`;

    if(note){

        msg += `📝 Note: ${note}\n`;

    }

    window.location.href =
    `https://wa.me/${phoneNumber}?text=${encodeURIComponent(msg)}`;

}

/* ================= INIT ================= */

renderMenu();

updateCart();

</script>

</body>
</html>
